{% extends 'base.html' %}
{% block title %}Nouveau Devis{% endblock %}
{% block page_title %}Nouveau Devis{% endblock %}
{% block content %}
<div class="card" style="max-width:900px;">
  <div class="card-header">📄 Créer un devis</div>
  <div class="card-body">
    <form method="POST" id="devisForm">
      <div class="row g-3 mb-4">
        <div class="col-md-4"><label class="form-label">Immatriculation *</label>
          <input type="text" name="immatriculation" class="form-control text-uppercase" required></div>
        <div class="col-md-4"><label class="form-label">Marque</label>
          <input type="text" name="marque" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Modèle</label>
          <input type="text" name="modele" class="form-control"></div>
        <div class="col-md-6"><label class="form-label">Client *</label>
          <select name="client_id" class="form-select">
            <option value="">-- Sélectionner --</option>
            {% for c in clients %}
            <option value="{{ c.id }}">{{ c.nom_complet }} — {{ c.telephone or '' }}</option>
            {% endfor %}
          </select></div>
        <div class="col-md-6"><label class="form-label">Technicien</label>
          <select name="technicien_id" class="form-select">
            <option value="">-- Aucun --</option>
            {% for e in employes %}
            <option value="{{ e.id }}">{{ e.nom_complet }}</option>
            {% endfor %}
          </select></div>
        <div class="col-12"><label class="form-label">Panne / Travaux demandés *</label>
          <textarea name="description_panne" class="form-control" rows="2" required></textarea></div>
      </div>

      <hr>
      <h6 style="color:var(--text-muted);margin-bottom:16px;">LIGNES DU DEVIS</h6>

      <div id="lignes">
        <div class="row g-2 mb-2 ligne-row">
          <div class="col-md-5"><input type="text" name="designation[]" class="form-control form-control-sm" placeholder="Désignation pièce/service" required></div>
          <div class="col-md-2"><input type="number" name="quantite[]" class="form-control form-control-sm" placeholder="Qté" value="1" min="0.5" step="0.5"></div>
          <div class="col-md-3"><input type="number" name="prix_unitaire[]" class="form-control form-control-sm" placeholder="Prix unitaire FBu" min="0"></div>
          <div class="col-md-2"><input type="hidden" name="piece_id[]" value=""><button type="button" class="btn btn-sm btn-outline-secondary w-100" onclick="removeLigne(this)">✕</button></div>
        </div>
      </div>

      <button type="button" class="btn btn-sm btn-outline-secondary mb-4" onclick="addLigne()">+ Ajouter une ligne</button>

      <hr>
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Main d'œuvre (FBu)</label>
          <input type="number" name="montant_mo" class="form-control" value="0" min="0"></div>
        <div class="col-md-4"><label class="form-label">Taux TVA</label>
          <select name="taux_tva" class="form-select">
            {% for val, label in tva_options %}
            <option value="{{ val }}" {{ 'selected' if val == 18 }}>{{ label }}</option>
            {% endfor %}
          </select></div>
        <div class="col-md-4"><label class="form-label">Notes</label>
          <input type="text" name="notes" class="form-control" placeholder="Remarques..."></div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">💾 Créer le devis</button>
          <a href="{{ url_for('devis_bp.index') }}" class="btn btn-outline-secondary ms-2">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>
<script>
function addLigne() {
  const div = document.createElement('div');
  div.className = 'row g-2 mb-2 ligne-row';
  div.innerHTML = `
    <div class="col-md-5"><input type="text" name="designation[]" class="form-control form-control-sm" placeholder="Désignation pièce/service"></div>
    <div class="col-md-2"><input type="number" name="quantite[]" class="form-control form-control-sm" placeholder="Qté" value="1" min="0.5" step="0.5"></div>
    <div class="col-md-3"><input type="number" name="prix_unitaire[]" class="form-control form-control-sm" placeholder="Prix unitaire FBu" min="0"></div>
    <div class="col-md-2"><input type="hidden" name="piece_id[]" value=""><button type="button" class="btn btn-sm btn-outline-secondary w-100" onclick="removeLigne(this)">✕</button></div>`;
  document.getElementById('lignes').appendChild(div);
}
function removeLigne(btn) {
  const rows = document.querySelectorAll('.ligne-row');
  if (rows.length > 1) btn.closest('.ligne-row').remove();
}
</script>
{% endblock %}
