<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Duka Auto</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🔧</div>
      <h4 style="color:var(--text);font-weight:700;margin:0;">Duka Auto</h4>
      <p style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">Gestion de Garage</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Identifiant</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" name="remember" id="rem">
        <label class="form-check-label" for="rem" style="color:var(--text-muted);text-transform:none;font-size:0.82rem;">Se souvenir de moi</label>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="padding:10px;">Se connecter</button>
    </form>
  </div>
</body>
</html>
