{% extends 'base.html' %}
{% block title %}{{ 'Modifier' if user else 'Nouvel' }} Utilisateur{% endblock %}
{% block page_title %}{{ 'Modifier' if user else 'Nouvel' }} Utilisateur{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Identifiant *</label>
          <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" {{ 'readonly' if user }} required></div>
        <div class="col-md-6"><label class="form-label">Rôle</label>
          <select name="role" class="form-select">
            {% for val, label in [('admin','Administrateur'),('manager','Manager'),('technicien','Technicien'),('comptable','Comptable'),('receptionniste','Réceptionniste')] %}
            <option value="{{ val }}" {{ 'selected' if user and user.role == val }}>{{ label }}</option>
            {% endfor %}
          </select></div>
        <div class="col-12"><label class="form-label">Nom complet</label>
          <input type="text" name="nom_complet" class="form-control" value="{{ user.nom_complet if user else '' }}"></div>
        <div class="col-md-6"><label class="form-label">Email *</label>
          <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required></div>
        <div class="col-md-6"><label class="form-label">Téléphone</label>
          <input type="text" name="telephone" class="form-control" value="{{ user.telephone if user else '' }}"></div>
        <div class="col-md-6"><label class="form-label">{{ 'Nouveau mot de passe' if user else 'Mot de passe *' }}</label>
          <input type="password" name="password" class="form-control" {{ '' if user else 'required' }} placeholder="{{ '(laisser vide = inchangé)' if user else '' }}"></div>
        {% if user %}
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="actif" id="actif" {{ 'checked' if user.actif }}>
            <label class="form-check-label" for="actif" style="color:var(--text);text-transform:none;font-size:0.875rem;">Compte actif</label>
          </div>
        </div>
        {% endif %}
        <div class="col-12">
          <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
          <a href="{{ url_for('users.index') }}" class="btn btn-outline-secondary ms-2">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
